# Start with a minimal pipeline that you can customize to build and deploy your code.
# Add steps that build, run tests, deploy, and more:
# https://aka.ms/yaml

trigger:
- main

pool:
  vmImage: ubuntu-latest

variables:
  acrServiceConnection: credsc
  tags: '$(Build.BuildId)'
  frontendrepo: 'Credapp/Frontend'
  paymentrepo: 'Credapp/Payment'
  userrepo: 'Credapp/User'

stages:
  - stage: DockerBuild
    displayName: Create docker images
    jobs:
      - job: BuildAndPushImages
        displayName: Build and push docker images to ACR
        steps:
          - checkout: self
          - task: Docker@2
            displayName: Build and push frontend service docker images
            inputs:
              containerRegistry: 'credsc'
              repository: '$(frontendrepo)'
              command: 'buildAndPush'
              Dockerfile: 'frontend-react/Dockerfile'
              




